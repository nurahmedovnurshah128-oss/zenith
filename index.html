<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЗЕНИТ</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --c: #00d4ff;
  --c2: rgba(0,212,255,.15);
  --c3: rgba(0,212,255,.35);
  --r: #ff3b5c;
  --r2: rgba(255,59,92,.15);
  --g: #00ffaa;
  --g2: rgba(0,255,170,.15);
  --bg: #070c14;
  --bg2: #0c1520;
  --bg3: #111d2b;
  --bd: rgba(0,212,255,.18);
  --tx: #ddf0ff;
  --tx2: rgba(221,240,255,.45);
  --f1: 'Exo 2', sans-serif;
  --f2: 'Rajdhani', sans-serif;
  --f3: 'Share Tech Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#040810}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;z-index:0;
}

/* ── AMBIENT GLOWS ── */
.gl{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;animation:gldrift 9s ease-in-out infinite alternate}
.gl1{width:500px;height:500px;background:rgba(0,212,255,.07);top:-180px;left:-180px}
.gl2{width:360px;height:360px;background:rgba(255,59,92,.055);bottom:-80px;right:-80px;animation-delay:-4s}
@keyframes gldrift{from{transform:translate(0,0)}to{transform:translate(25px,18px)}}

/* ── SHELL ── */
#shell{
  position:relative;z-index:1;
  width:100%;max-width:420px;height:100vh;
  margin:0 auto;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#0a1019 0%,#07090f 100%);
  overflow:hidden;
  border-left:1px solid rgba(0,212,255,.08);
  border-right:1px solid rgba(0,212,255,.08);
}

/* ── STATUS BAR ── */
.sbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 18px 6px;
  font-family:var(--f3);font-size:10px;color:var(--tx2);
  flex-shrink:0;
}
.sys-status{display:flex;align-items:center;gap:5px;color:var(--g);font-family:var(--f2);font-size:11px;letter-spacing:2.5px;font-weight:600}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 7px var(--g);animation:sdot 2s ease-in-out infinite}
@keyframes sdot{0%,100%{opacity:1}50%{opacity:.45}}

/* ── PAGES ── */
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.on{display:flex;animation:pfade .25s ease-out}
@keyframes pfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE HEADER ── */
.ph{padding:10px 18px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.ph-sup{font-family:var(--f2);font-size:11px;font-weight:600;letter-spacing:3.5px;color:var(--c);margin-bottom:3px}
.ph-title{font-family:var(--f2);font-size:26px;font-weight:700;letter-spacing:.5px;color:var(--tx)}
.ph-sub{font-size:12px;color:var(--tx2);margin-top:3px;font-family:var(--f1)}

/* ── SCROLL AREA ── */
.scr{flex:1;overflow-y:auto;padding-bottom:74px}
.scr::-webkit-scrollbar{display:none}

/* ============================================================
   DASHBOARD
   ============================================================ */
.sec-lbl{
  font-family:var(--f2);font-size:10px;font-weight:600;
  letter-spacing:3.5px;color:var(--tx2);
  padding:14px 18px 7px;text-transform:uppercase;
}

.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}

.dcard{
  background:var(--bg3);
  border:1px solid var(--bd);
  border-radius:15px;padding:13px;
  cursor:pointer;transition:all .22s;
  position:relative;overflow:hidden;
}
.dcard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--c2),transparent 55%);
  opacity:0;transition:opacity .3s;
}
.dcard:hover::before,.dcard.lit::before{opacity:1}
.dcard.lit{border-color:var(--c);box-shadow:0 0 18px var(--c3)}
.dcard-ico{font-size:26px;margin-bottom:7px;filter:drop-shadow(0 0 6px var(--c))}
.dcard-name{font-family:var(--f2);font-size:13px;font-weight:600;letter-spacing:.8px}
.dcard-id{font-family:var(--f3);font-size:9px;color:var(--tx2);margin-top:2px}
.dcard-st{font-family:var(--f2);font-size:10px;font-weight:600;letter-spacing:2px;margin-top:5px}
.dcard-st.on{color:var(--g)}.dcard-st.off{color:var(--tx2)}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}

.tog{
  width:34px;height:18px;background:var(--bg2);border-radius:9px;
  position:relative;cursor:pointer;
  border:1px solid rgba(255,255,255,.1);transition:background .28s;
}
.tog.on{background:var(--c)}
.tog::after{
  content:'';position:absolute;top:2px;left:2px;
  width:12px;height:12px;background:#fff;border-radius:50%;
  transition:transform .28s;box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.tog.on::after{transform:translateX(16px)}

.addcard{
  background:transparent;border:1px dashed rgba(0,212,255,.28);
  border-radius:15px;padding:13px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;min-height:116px;transition:all .22s;
}
.addcard:hover{border-color:var(--c);background:var(--c2)}
.addcard-ico{font-size:26px;color:var(--c)}
.addcard-lbl{font-family:var(--f2);font-size:11px;color:var(--c);letter-spacing:2px;text-align:center}

.hscr{display:flex;gap:9px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
.hscr::-webkit-scrollbar{display:none}
.hbtn{
  flex-shrink:0;background:var(--bg3);border:1px solid var(--bd);
  border-radius:12px;padding:9px 14px;
  font-family:var(--f2);font-size:12px;font-weight:600;
  letter-spacing:1px;color:var(--tx);cursor:pointer;white-space:nowrap;
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.hbtn:hover{border-color:var(--c);color:var(--c);background:var(--c2)}
.hbtn span{font-size:15px}

/* ============================================================
   MI REMOTE
   ============================================================ */
.rtabs{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.rtabs::-webkit-scrollbar{display:none}
.rtab{
  flex-shrink:0;background:var(--bg3);border:1px solid var(--bd);
  border-radius:12px;padding:7px 13px;
  font-family:var(--f2);font-size:11px;font-weight:600;letter-spacing:1px;color:var(--tx2);
  cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.rtab .tico{font-size:19px}
.rtab.on{border-color:var(--c);color:var(--c);background:var(--c2)}

.rpanel{
  background:var(--bg3);border:1px solid var(--bd);
  border-radius:18px;padding:18px;margin:0 14px 10px;
}
.rpanel-title{
  text-align:center;font-family:var(--f2);font-size:13px;
  letter-spacing:3px;color:var(--c);margin-bottom:14px;font-weight:600;
}

/* POWER RING */
.pwrap{display:flex;justify-content:center;margin-bottom:16px}
.pring{
  width:76px;height:76px;border-radius:50%;
  background:var(--bg2);
  position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.pring::before{
  content:'';position:absolute;inset:-2px;border-radius:50%;
  background:conic-gradient(var(--r) 0deg,var(--c) 180deg,var(--r) 360deg);
  z-index:-1;animation:pspin 4s linear infinite;
}
@keyframes pspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.pring:hover{transform:scale(1.06)}
.pring.on{box-shadow:0 0 28px var(--c3),0 0 55px rgba(0,212,255,.25)}
.pring svg{width:28px;height:28px;color:var(--c);fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round}

/* SLIDERS + D-PAD ROW */
.spdrow{display:flex;gap:16px;align-items:center;justify-content:space-between;padding:0 6px}
.sgrp{display:flex;flex-direction:column;align-items:center;gap:7px}
.slbl{font-family:var(--f2);font-size:10px;letter-spacing:2px;color:var(--tx2)}
.strk{
  width:6px;height:110px;background:var(--bg2);border-radius:3px;
  position:relative;cursor:pointer;border:1px solid rgba(255,255,255,.06);
}
.sfill{position:absolute;bottom:0;left:0;right:0;border-radius:3px;transition:height .18s}
.sfill.v{background:linear-gradient(to top,var(--r),var(--c))}
.sfill.c{background:linear-gradient(to top,var(--c),rgba(0,212,255,.3))}
.sthumb{
  position:absolute;left:50%;transform:translateX(-50%);
  width:15px;height:15px;background:#fff;border-radius:50%;
  box-shadow:0 0 9px var(--c);transition:bottom .18s;cursor:grab;
}

/* DPAD */
.dpad{position:relative;width:148px;height:148px;flex-shrink:0}
.dpad-ring{
  position:absolute;inset:0;border-radius:50%;background:var(--bg2);
  border:1px solid var(--bd);
}
.dpad-ring::before{
  content:'';position:absolute;inset:-2px;border-radius:50%;
  background:conic-gradient(var(--r) 0deg,transparent 55deg,var(--c) 180deg,transparent 235deg,var(--r) 360deg);
  z-index:-1;
}
.dpbtn{
  position:absolute;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--tx2);font-family:var(--f2);font-size:16px;font-weight:700;
  transition:color .18s;user-select:none;
}
.dpbtn:hover{color:var(--c)}
.dpbtn:active{color:#fff;transform:scale(.9)}
.dp-u{top:4px;left:50%;transform:translateX(-50%)}
.dp-d{bottom:4px;left:50%;transform:translateX(-50%)}
.dp-l{left:4px;top:50%;transform:translateY(-50%)}
.dp-r{right:4px;top:50%;transform:translateY(-50%)}
.dp-ok{
  position:absolute;inset:28%;border-radius:50%;
  background:var(--bg);border:1px solid var(--bd);
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f2);font-size:12px;font-weight:700;color:var(--tx2);
}
.dp-ok:hover{background:var(--c2);color:var(--c)}

/* NUM GRID */
.ngrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:13px}
.nbtn{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:10px;font-family:var(--f2);font-size:18px;font-weight:700;
  color:var(--tx);text-align:center;cursor:pointer;transition:all .18s;
  user-select:none;
}
.nbtn:hover{border-color:var(--c);color:var(--c);background:var(--c2)}
.nbtn:active{transform:scale(.93)}

.actrow{display:flex;gap:7px;margin-top:9px}
.actbtn{
  flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:9px 4px;font-family:var(--f2);font-size:11px;font-weight:600;letter-spacing:1px;
  color:var(--tx2);text-align:center;cursor:pointer;transition:all .18s;
}
.actbtn:hover{border-color:var(--c);color:var(--c)}
.actbtn.red:hover{border-color:var(--r);color:var(--r)}

/* AC */
.tmp-row{display:flex;align-items:center;justify-content:center;gap:22px;margin:14px 0}
.tmpbtn{
  width:44px;height:44px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-family:var(--f2);font-weight:700;color:var(--tx);
  cursor:pointer;transition:all .18s;user-select:none;
}
.tmpbtn:hover{border-color:var(--c);color:var(--c);background:var(--c2)}
.tmpval{font-family:var(--f2);font-size:52px;font-weight:700;color:var(--c);line-height:1}

/* SLIDER horizontal */
.hslider{width:100%;accent-color:var(--c);cursor:pointer;margin-top:6px;height:4px}

/* ============================================================
   AI CHAT
   ============================================================ */
.chdr{
  padding:11px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:11px;flex-shrink:0;
}
.aiva{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:2px solid var(--c);
  display:flex;align-items:center;justify-content:center;font-size:19px;
  box-shadow:0 0 18px var(--c3);position:relative;overflow:hidden;
  flex-shrink:0;
}
.aiva::before{
  content:'';position:absolute;inset:0;
  background:conic-gradient(var(--c) 0deg,transparent 25deg,transparent 335deg,var(--c) 360deg);
  animation:pspin 3s linear infinite;opacity:.25;
}
.aiinfo{flex:1}
.ainame{font-family:var(--f2);font-size:19px;font-weight:700;letter-spacing:2.5px}
.aist{font-family:var(--f3);font-size:10px;color:var(--g)}

.cmsgs{
  flex:1;overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:11px;
}
.cmsgs::-webkit-scrollbar{display:none}

.msg{max-width:83%;animation:min .28s ease-out}
@keyframes min{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-self:flex-start}
.msg.usr{align-self:flex-end}
.msender{font-family:var(--f3);font-size:10px;color:var(--c);margin-bottom:3px}
.mbubble{
  border-radius:14px;padding:10px 13px;
  font-size:14px;line-height:1.55;font-family:var(--f1);
}
.msg.ai .mbubble{background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:4px}
.msg.usr .mbubble{
  background:linear-gradient(135deg,rgba(0,212,255,.18),rgba(0,212,255,.09));
  border:1px solid rgba(0,212,255,.28);border-bottom-right-radius:4px;
}

.typing{
  display:none;align-items:center;gap:4px;
  padding:8px 12px;background:var(--bg3);
  border:1px solid var(--bd);border-radius:14px;
  width:fit-content;margin:0 14px;flex-shrink:0;
}
.typing.show{display:flex}
.tdot{
  width:6px;height:6px;border-radius:50%;background:var(--c);opacity:.4;
  animation:tdot 1.1s infinite;
}
.tdot:nth-child(2){animation-delay:.18s}
.tdot:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}

.voicebar{
  display:none;align-items:center;justify-content:center;
  gap:3px;padding:6px 14px;flex-shrink:0;
}
.voicebar.show{display:flex}
.vw{width:3px;background:var(--c);border-radius:2px;animation:vwa .55s ease-in-out infinite alternate}
.vw:nth-child(1){height:7px;animation-delay:0s}
.vw:nth-child(2){height:18px;animation-delay:.1s}
.vw:nth-child(3){height:28px;animation-delay:.2s}
.vw:nth-child(4){height:18px;animation-delay:.3s}
.vw:nth-child(5){height:7px;animation-delay:.4s}
@keyframes vwa{from{transform:scaleY(.35)}to{transform:scaleY(1)}}
.vlbl{font-family:var(--f2);font-size:11px;letter-spacing:2px;color:var(--c);margin-left:7px}

.cinbar{
  padding:9px 14px 18px;display:flex;gap:7px;align-items:flex-end;
  border-top:1px solid var(--bd);flex-shrink:0;
}
.cinput{
  flex:1;background:var(--bg3);border:1px solid var(--bd);
  border-radius:13px;padding:10px 13px;
  color:var(--tx);font-family:var(--f1);font-size:14px;
  outline:none;resize:none;max-height:96px;line-height:1.4;
  transition:border-color .2s;
}
.cinput:focus{border-color:var(--c)}
.cinput::placeholder{color:var(--tx2)}
.sndbtn,.micbtn{
  width:42px;height:42px;border-radius:50%;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:all .2s;flex-shrink:0;
}
.sndbtn{background:var(--c);color:var(--bg);box-shadow:0 0 14px var(--c3)}
.sndbtn:hover{transform:scale(1.08);box-shadow:0 0 22px var(--c)}
.micbtn{background:var(--bg3);border:1px solid var(--bd);color:var(--tx2)}
.micbtn.rec{background:var(--r2);border-color:var(--r);color:var(--r);animation:recpulse 1s ease-in-out infinite}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 var(--r2)}50%{box-shadow:0 0 0 8px transparent}}

/* ============================================================
   SETTINGS
   ============================================================ */
.sprofile{
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
  border:1px solid var(--c);border-radius:18px;
  padding:18px;margin:12px 14px 0;
  display:flex;gap:14px;align-items:center;
}
.spava{
  width:62px;height:62px;border-radius:50%;
  background:linear-gradient(135deg,#0a1526,#192738);
  border:2px solid var(--c);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 22px var(--c3);flex-shrink:0;
}
.spname{font-family:var(--f2);font-size:21px;font-weight:700;letter-spacing:2.5px;color:var(--c)}
.spsub{font-size:12px;color:var(--tx2);margin-top:2px;font-family:var(--f1)}
.spedit{
  background:var(--c2);border:1px solid var(--c);border-radius:8px;
  padding:5px 11px;font-family:var(--f2);font-size:11px;letter-spacing:1px;
  color:var(--c);cursor:pointer;transition:all .2s;margin-top:8px;display:inline-block;
}
.spedit:hover{background:var(--c);color:var(--bg)}

.gttog{display:flex;gap:7px;margin-top:11px}
.gtbtn{
  flex:1;padding:7px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:9px;font-family:var(--f2);font-size:11px;font-weight:600;
  letter-spacing:1px;color:var(--tx2);text-align:center;cursor:pointer;transition:all .2s;
}
.gtbtn.on{background:var(--c2);border-color:var(--c);color:var(--c)}
.gtsub{font-size:9px;color:var(--tx2);margin-top:1px;letter-spacing:0}

.scard{
  background:var(--bg3);border:1px solid var(--bd);
  border-radius:15px;margin:10px 14px 0;overflow:hidden;
}
.sctitle{
  font-family:var(--f2);font-size:10px;font-weight:600;
  letter-spacing:3.5px;color:var(--c);
  padding:11px 15px 7px;text-transform:uppercase;
}
.srow{
  display:flex;align-items:center;padding:11px 15px;
  border-top:1px solid rgba(255,255,255,.04);gap:11px;
}
.sico{font-size:19px;flex-shrink:0}
.sinfo{flex:1}
.sname{font-size:14px;font-weight:500;font-family:var(--f1)}
.sdesc{font-size:11px;color:var(--tx2);margin-top:1px;font-family:var(--f1)}
.sarr{font-size:12px;color:var(--c);font-family:var(--f2);font-weight:700}

/* ============================================================
   BOTTOM NAV
   ============================================================ */
.bnav{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(7,12,20,.96);backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  display:flex;padding:7px 0 14px;z-index:100;
}
.nbtn2{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:5px;transition:all .2s;position:relative;
}
.nbico{font-size:21px;transition:all .2s;filter:grayscale(1) opacity(.45)}
.nblbl{
  font-family:var(--f2);font-size:10px;font-weight:600;
  letter-spacing:1px;color:var(--tx2);transition:color .2s;
}
.nbtn2.on .nbico{filter:none}
.nbtn2.on .nblbl{color:var(--c)}
.nbtn2.on::after{
  content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  width:28px;height:2px;background:var(--c);border-radius:1px;box-shadow:0 0 7px var(--c);
}

/* ============================================================
   MODAL
   ============================================================ */
.movl{
  position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
}
.movl.show{display:flex}
.modal{
  background:var(--bg2);border-top:1px solid var(--bd);
  border-radius:20px 20px 0 0;padding:20px;
  width:100%;max-width:420px;animation:msup .28s ease-out;
}
@keyframes msup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{
  font-family:var(--f2);font-size:17px;font-weight:700;
  letter-spacing:2px;text-align:center;margin-bottom:14px;color:var(--c);
}
.minput{
